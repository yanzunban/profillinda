<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Keren - Blue Vibes</title>
    <!-- Mengambil font FontAwesome untuk ikon media sosial -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Menghubungkan ke file CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">
        <div class="image-area">
            <!-- Ganti URL gambar di bawah dengan foto kamu sendiri -->
            <img src="https://www.image2url.com/id/image-share?u=https%3A%2F%2Fwww.image2url.com%2Fr2%2Fdefault%2Fimages%2F1779117563966-2e1b6ac5-fb73-472a-9b82-90dac9da6dee.jpg&n=1000793506" alt="Foto Profil">
        </div>
        
        <div class="info-area">
            <h1>YANZZSTORE15</h1>
            <h2>Full Stack Developer</h2>
            <p>Suka membangun aplikasi web yang interaktif, bersih, dan modern. Fokus pada pengalaman pengguna yang luar biasa dengan sentuhan estetika tinggi.</p>
        </div>

        <div class="stats">
            <div class="box">
                <span class="number">42</span>
                <span class="label">Proyek</span>
            </div>
            <div class="box">
                <span class="number">12K</span>
                <span class="label">Pengikut</span>
            </div>
        </div>

        <div class="social-icons">
            <a href="#" class="icon-link"><i class="fab fa-instagram"></i></a>
            <a href="#" class="icon-link"><i class="fab fa-github"></i></a>
            <a href="#" class="icon-link"><i class="fab fa-linkedin-in"></i></a>
        </div>

        <div class="buttons">
            <button class="btn btn-primary">Ikuti</button>
            <button class="btn btn-secondary">Kirim Pesan</button>
        </div>
    </div>

</body>
</html>
